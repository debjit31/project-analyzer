# Test configuration — overrides application.properties for tests
app.jsearch-api-key=test-key
app.gemini-api-key=test-key
app.openai-api-key=test-key
app.ai-provider=gemini
app.allowed-origins=http://localhost:5173
logging.level.root=WARN

# JWT — required by JwtService (must be >= 32 chars)
app.jwt-secret=test-secret-for-ci-must-be-32-chars!!

# OAuth2 — placeholder client credentials for tests
spring.security.oauth2.client.registration.google.client-id=test-google-client-id
spring.security.oauth2.client.registration.google.client-secret=test-google-secret
spring.security.oauth2.client.registration.github.client-id=test-github-client-id
spring.security.oauth2.client.registration.github.client-secret=test-github-secret

# H2 in-memory DB for tests
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
