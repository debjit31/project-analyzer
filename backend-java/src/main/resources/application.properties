# ?? Application ???????????????????????????????????????????????????????????????
app.name=Project Analyzer API
app.version=1.0.0
app.env=development

# ?? Server ????????????????????????????????????????????????????????????????????
server.port=8000

# ?? CORS ??????????????????????????????????????????????????????????????????????
app.allowed-origins=http://localhost:5173,http://localhost:4173

# ?? JSearch (RapidAPI) ????????????????????????????????????????????????????????
app.jsearch-api-key=
app.jsearch-base-url=https://jsearch.p.rapidapi.com
app.jsearch-max-results=10

# ?? AI Provider ???????????????????????????????????????????????????????????????
# Options: gemini | openai
app.ai-provider=gemini

# Get your key at https://aistudio.google.com/app/apikey
app.gemini-api-key=
app.gemini-model=gemini-1.5-flash

# Get your key at https://platform.openai.com
app.openai-api-key=
app.openai-model=gpt-4o-mini

# ?? Concurrency & Timeouts ????????????????????????????????????????????????????
app.ai-concurrency-limit=5
app.http-timeout-seconds=30.0

# ?? Cache ?????????????????????????????????????????????????????????????????????
app.cache-ttl-seconds=600
app.cache-max-size=128

# ?? JWT ???????????????????????????????????????????????????????????????????????
# IMPORTANT: Replace with a strong random secret (>= 32 chars) in production
app.jwt-secret=change-me-in-production-must-be-32-chars-long!!

# ?? OAuth2 ????????????????????????????????????????????????????????????????????
# Register your app at:
#   Google:  https://console.cloud.google.com/apis/credentials
#   GitHub:  https://github.com/settings/developers
# Redirect URIs to register:
#   http://localhost:8000/login/oauth2/code/google
#   http://localhost:8000/login/oauth2/code/github
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=openid,profile,email

spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID:}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET:}
spring.security.oauth2.client.registration.github.scope=user:email,read:user

# ?? Database (H2 in-memory — user store) ?????????????????????????????????????
spring.datasource.url=jdbc:h2:mem:projectanalyzerdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ?? Logging ???????????????????????????????????????????????????????????????????
logging.level.root=INFO
logging.level.com.projectanalyzer=INFO

# ?? Spring Actuator ???????????????????????????????????????????????????????????
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# ?? Resilience4j Retry ????????????????????????????????????????????????????????
# JSearch HTTP retries (3 attempts, exponential back-off 1s ? 8s)
resilience4j.retry.instances.jsearch.max-attempts=3
resilience4j.retry.instances.jsearch.wait-duration=1s
resilience4j.retry.instances.jsearch.enable-exponential-backoff=true
resilience4j.retry.instances.jsearch.exponential-backoff-multiplier=2

# AI provider retries (3 attempts, exponential back-off 2s ? 10s)
resilience4j.retry.instances.ai-provider.max-attempts=3
resilience4j.retry.instances.ai-provider.wait-duration=2s
resilience4j.retry.instances.ai-provider.enable-exponential-backoff=true
resilience4j.retry.instances.ai-provider.exponential-backoff-multiplier=2

# ?? SpringDoc / Swagger ???????????????????????????????????????????????????????
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/docs
springdoc.swagger-ui.operationsSorter=alpha
